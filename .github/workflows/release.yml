name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: false
        default: ''

jobs:
  # ── Windows ──────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS dependencies
        run: npm ci

      - name: Build Tauri app
        run: npx tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Determine release tag
        id: tag
        shell: pwsh
        run: |
          $ref = "${{ github.ref }}"
          $input_tag = "${{ github.event.inputs.tag }}"
          if ($ref -match '^refs/tags/(.+)$') { $tag = $Matches[1] }
          elseif ($input_tag -ne '') { $tag = $input_tag }
          else { $tag = '' }
          "value=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Release tag: $tag"

      - name: Attach to GitHub Release
        if: steps.tag.outputs.value != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: 'Magic Cursor ${{ steps.tag.outputs.value }}'
          body: |
            ## Magic Cursor ${{ steps.tag.outputs.value }} — Open Source

            Shake your mouse to open an instant AI overlay. BYOK edition — connect your own Ollama, OpenAI, or Groq key.

            ### Downloads
            | Platform | File |
            |---|---|
            | Windows | `.msi` installer |
            | macOS (Universal) | `.dmg` disk image |

            ### Setup
            1. Install and launch Magic Cursor
            2. Open Settings from the tray icon
            3. Choose your provider and paste your API key
            4. Shake your mouse to start

            ---
            Want zero-setup? Try [Magic Cursor Managed](https://magiccursor.app) — $9.99/month, license key only.
          draft: false
          prerelease: false
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── macOS (Universal binary) ──────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS dependencies
        run: npm ci

      - name: Build Tauri app (universal binary)
        run: npx tauri build --target universal-apple-darwin

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-installers
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      - name: Determine release tag
        id: tag
        run: |
          REF="${{ github.ref }}"
          INPUT="${{ github.event.inputs.tag }}"
          if [[ "$REF" =~ ^refs/tags/(.+)$ ]]; then TAG="${BASH_REMATCH[1]}"
          elif [[ -n "$INPUT" ]]; then TAG="$INPUT"
          else TAG=""
          fi
          echo "value=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG"

      - name: Attach to GitHub Release
        if: steps.tag.outputs.value != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: 'Magic Cursor ${{ steps.tag.outputs.value }}'
          body: |
            ## Magic Cursor ${{ steps.tag.outputs.value }} — Open Source

            Shake your mouse to open an instant AI overlay. BYOK edition — connect your own Ollama, OpenAI, or Groq key.

            ### Downloads
            | Platform | File |
            |---|---|
            | Windows | `.msi` installer |
            | macOS (Universal) | `.dmg` disk image |

            ### Setup
            1. Install and launch Magic Cursor
            2. Open Settings from the tray icon
            3. Choose your provider and paste your API key
            4. Shake your mouse to start

            ---
            Want zero-setup? Try [Magic Cursor Managed](https://magiccursor.app) — $9.99/month, license key only.
          draft: false
          prerelease: false
          files: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
