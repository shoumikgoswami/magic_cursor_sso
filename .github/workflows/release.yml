name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend deps
        run: npm ci

      # Windows: rdev requires no extra setup
      # macOS: rdev needs Accessibility, no extra libs needed at build time
      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing (optional — omit to produce unsigned builds)
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Magic Cursor ${{ github.ref_name }}'
          releaseBody: |
            ## Magic Cursor ${{ github.ref_name }}

            Shake your mouse → instant AI overlay. BYOK edition — bring your own Ollama, OpenAI, or Groq key.

            ### Downloads
            | Platform | File |
            |---|---|
            | Windows | `.msi` installer |
            | macOS (Apple Silicon) | `.dmg` disk image |
            | macOS (Intel) | `.dmg` disk image |

            ### Setup
            1. Install and launch Magic Cursor
            2. Open Settings from the tray icon
            3. Choose your provider and paste your API key
            4. Shake your mouse to start

            ---
            Want zero-setup? Try [Magic Cursor Managed](https://magiccursor.app) — $9/month, license key only.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
